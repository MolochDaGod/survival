# Grudge Nexus — docker-compose for API server + Postgres
#
# Usage:
#   cp .env.example .env    # fill in real values
#   docker compose up -d --build
#
# The API server is exposed on port 5000. Front-ends are deployed via Vercel.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: grudge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grudge_dev}
      POSTGRES_DB: grudge_nexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grudge -d grudge_nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: postgres://grudge:${POSTGRES_PASSWORD:-grudge_dev}@db:5432/grudge_nexus
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://grudgewarlords.com,https://grudge-studio.com}
      # R2 / Object Storage
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}
      OBJECT_STORAGE_KEY: ${OBJECT_STORAGE_KEY}
      OBJECT_STORAGE_SECRET: ${OBJECT_STORAGE_SECRET}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-auto}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL}
      R2_BUCKET_ASSETS: ${R2_BUCKET_ASSETS:-grudge-assets}
      R2_BUCKET_OBJECTSTORE: ${R2_BUCKET_OBJECTSTORE:-objectstore-assets}
      # D1 (asset catalog — optional)
      D1_ACCOUNT_ID: ${D1_ACCOUNT_ID:-}
      D1_DATABASE_ID: ${D1_DATABASE_ID:-}
      D1_API_TOKEN: ${D1_API_TOKEN:-}

volumes:
  pgdata:
